<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WASSA WASSA — Staff Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#e8dcc8;--sand-light:#f5f0e8;--earth:#8b6f47;--earth-dark:#4a3728;
  --earth-mid:#6b4f38;--ocean:#3d6b7a;--forest:#4e6b44;--cream:#faf8f3;
  --charcoal:#2c2825;--warm-gray:#9a8878;--coral:#b86840;--gold:#c4973a;
  --danger:#8b3a2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--charcoal)}

/* ===== SPLASH ===== */
#splash{
  position:fixed;inset:0;z-index:3000;
  background:linear-gradient(160deg,#1a0f08 0%,#3a2510 50%,#1a2820 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;
  transition:opacity 0.8s;
}
#splash.hide{opacity:0;pointer-events:none}
.sp-logo{text-align:center}
.sp-logo .ww{font-family:'Cormorant Garamond',serif;color:var(--sand);font-size:54px;font-weight:300;letter-spacing:10px;display:block}
.sp-logo .sub{font-family:'Cormorant Garamond',serif;color:var(--warm-gray);font-size:13px;letter-spacing:5px;font-style:italic;margin-top:6px;display:block}
.sp-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--sand),transparent)}
.sp-prompt{font-family:'Cormorant Garamond',serif;color:var(--sand-light);font-size:16px;letter-spacing:3px;font-style:italic}
.sp-langs{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:370px}
.sp-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(232,220,200,0.2);
  color:var(--sand);padding:20px 16px;border-radius:12px;cursor:pointer;
  text-align:center;transition:all 0.25s;font-family:inherit;
}
.sp-btn:hover{background:rgba(232,220,200,0.14);border-color:rgba(232,220,200,0.5);transform:translateY(-2px)}
.sp-btn .flag{font-size:28px;display:block;margin-bottom:7px}
.sp-btn .lname{font-size:16px;font-weight:500;display:block}
.sp-btn .lsub{font-size:11px;opacity:0.55;margin-top:3px;display:block}

/* ===== APP SHELL ===== */
#app{height:100vh;display:flex;flex-direction:column}
.header{
  background:var(--earth-dark);padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 2px 16px rgba(0,0,0,0.3);
}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-logo{font-family:'Cormorant Garamond',serif;color:var(--sand);font-size:22px;font-weight:300;letter-spacing:4px}
.hd-badge{background:rgba(232,220,200,0.14);border:1px solid rgba(232,220,200,0.22);color:var(--sand);padding:3px 12px;border-radius:12px;font-size:11px;letter-spacing:1px}
.hd-right{display:flex;align-items:center;gap:10px}
.hd-lang{display:flex;align-items:center;gap:7px;background:rgba(232,220,200,0.1);border:1px solid rgba(232,220,200,0.2);border-radius:20px;padding:6px 14px;cursor:pointer;color:var(--sand);font-size:13px;font-family:inherit;transition:all 0.2s}
.hd-lang:hover{background:rgba(232,220,200,0.2)}
.hd-lang .flag-sm{font-size:18px}

/* Tabs */
.tab-bar{display:flex;background:#3a2812;border-bottom:2px solid var(--earth-mid);flex-shrink:0}
.tab-item{flex:1;padding:13px 6px;text-align:center;cursor:pointer;font-size:11px;color:rgba(232,220,200,0.4);border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab-item .ti{font-size:20px;display:block;margin-bottom:3px}
.tab-item.active{color:var(--sand);border-bottom-color:var(--gold)}
.tab-item:hover:not(.active){color:rgba(232,220,200,0.7)}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px 18px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--earth);border-radius:3px}
.section{display:none}
.section.active{display:block}

/* ===== TEMPLATE TAB ===== */
.cat-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-btn{
  display:flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:22px;border:1px solid var(--sand);
  background:var(--sand-light);color:var(--earth-dark);
  cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s;
}
.cat-btn.active{background:var(--earth-dark);color:var(--sand);border-color:var(--earth-dark)}
.cat-btn:hover:not(.active){background:var(--sand);border-color:var(--earth)}
.cat-btn .cnt{font-size:10px;background:rgba(0,0,0,0.12);border-radius:10px;padding:1px 7px;margin-left:2px}
.cat-btn.active .cnt{background:rgba(255,255,255,0.2)}

.phrase-list{display:flex;flex-direction:column;gap:10px}
.phrase-card{
  background:#fff;border:1px solid rgba(139,111,71,0.14);
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 8px rgba(74,55,40,0.06);
  transition:all 0.2s;
}
.phrase-card:hover{box-shadow:0 4px 16px rgba(74,55,40,0.12)}
.phrase-main{
  padding:14px 16px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
}
.phrase-main:hover{background:var(--sand-light)}
.phrase-jp{font-size:14px;line-height:1.75;color:var(--charcoal);flex:1}
.phrase-arrow{color:var(--gold);font-size:20px;flex-shrink:0;margin-top:1px;transition:transform 0.2s}
.phrase-card.expanded .phrase-arrow{transform:rotate(90deg)}
.phrase-actions{display:flex;gap:6px;padding:0 16px 8px;border-top:1px solid rgba(139,111,71,0.08)}
.pa-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s}
.pa-edit{background:var(--sand-light);color:var(--earth-dark);border:1px solid var(--sand)}
.pa-edit:hover{background:var(--sand)}
.pa-del{background:#fde8e2;color:var(--danger);border:1px solid rgba(184,104,64,0.15)}
.pa-del:hover{background:#f5ccc2}

/* Translation result inside card */
.phrase-result{
  padding:0 16px;max-height:0;overflow:hidden;transition:all 0.3s ease;
}
.phrase-card.expanded .phrase-result{max-height:400px;padding:0 16px 14px}
.trans-block{
  background:linear-gradient(135deg,#eef6ee,#e8f2e8);
  border:1px solid rgba(78,107,68,0.2);border-left:4px solid var(--forest);
  border-radius:10px;padding:14px 16px;margin-top:4px;
}
.tb-loading{color:var(--warm-gray);font-style:italic;font-size:13px;display:flex;align-items:center;gap:8px}
.tb-lang{font-size:10px;letter-spacing:2px;color:var(--warm-gray);margin-bottom:7px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.tb-text{font-size:18px;line-height:1.85;color:var(--charcoal)}
.tb-copy{float:right;background:var(--forest);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;margin-top:-4px;transition:opacity 0.2s}
.tb-copy:hover{opacity:0.85}
.show-full-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;margin-top:10px;padding:10px;border-radius:8px;
  background:linear-gradient(135deg,var(--earth-dark),var(--earth-mid));
  color:var(--sand);border:none;cursor:pointer;font-family:inherit;font-size:13px;
  transition:all 0.2s;
}
.show-full-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* Add form */
.add-form{
  background:var(--sand-light);border:1px solid var(--sand);
  border-radius:12px;padding:18px;margin-bottom:16px;
  display:none;
}
.add-form.show{display:block}
.form-lbl{font-size:11px;color:var(--warm-gray);display:block;margin-bottom:5px;letter-spacing:1px}
.form-sel{width:100%;border:1px solid rgba(139,111,71,0.25);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--charcoal);margin-bottom:10px}
.form-sel:focus{outline:none;border-color:var(--earth)}
.form-ta{width:100%;border:1px solid rgba(139,111,71,0.25);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--charcoal);resize:none;line-height:1.75;transition:border-color 0.2s}
.form-ta:focus{outline:none;border-color:var(--earth);background:#fff}
.form-btns{display:flex;gap:8px;margin-top:12px}

/* ===== FREE TRANS TAB ===== */
.ft-wrap{display:flex;flex-direction:column;gap:14px}
.ft-card{background:#fff;border-radius:12px;border:1px solid rgba(139,111,71,0.14);overflow:hidden;box-shadow:0 2px 10px rgba(74,55,40,0.07)}
.ft-head{background:linear-gradient(135deg,var(--earth-dark),var(--earth-mid));padding:14px 18px;display:flex;align-items:center;gap:12px}
.ft-head .fh-icon{font-size:22px}
.ft-head .fh-title{font-family:'Cormorant Garamond',serif;color:var(--sand);font-size:18px;font-weight:300;letter-spacing:1px}
.ft-head .fh-sub{color:rgba(232,220,200,0.6);font-size:11px;margin-top:2px}
.ft-body{padding:16px 18px}
.ft-textarea-wrap{position:relative;margin-bottom:12px}
.ft-ta{width:100%;border:1px solid rgba(139,111,71,0.25);border-radius:9px;padding:12px 14px;font-size:15px;font-family:inherit;background:var(--cream);color:var(--charcoal);resize:none;line-height:1.75;transition:border-color 0.2s}
.ft-ta:focus{outline:none;border-color:var(--earth);background:#fff}
.ft-cc{position:absolute;bottom:8px;right:12px;font-size:11px;color:var(--warm-gray)}
.ft-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.ft-result-area{display:none}
.ft-result-label{font-size:11px;color:var(--warm-gray);letter-spacing:1px;margin-bottom:10px}
.ft-result-box{
  background:linear-gradient(135deg,#eef6ee,#e8f2e8);
  border:1px solid rgba(78,107,68,0.2);border-left:4px solid var(--forest);
  border-radius:10px;padding:18px 20px;
}
.ft-result-lang{font-size:11px;color:var(--warm-gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ft-result-text{font-size:22px;line-height:1.85;color:var(--charcoal)}
.ft-result-text.loading{font-size:15px;color:var(--warm-gray);font-style:italic}
.ft-result-jp{margin-top:12px;padding-top:12px;border-top:1px solid rgba(78,107,68,0.15);font-size:13px;color:var(--warm-gray);line-height:1.7}

/* Full screen overlay */
#guestView{
  display:none;position:fixed;inset:0;z-index:900;
  background:linear-gradient(160deg,var(--earth-dark) 0%,#3a2510 50%,#1e3028 100%);
  padding:48px 32px;overflow-y:auto;
}
.gv-close{
  position:fixed;top:16px;right:16px;
  background:rgba(232,220,200,0.15);border:1px solid rgba(232,220,200,0.3);
  color:var(--sand);padding:8px 18px;border-radius:20px;cursor:pointer;
  font-size:13px;font-family:inherit;z-index:901;transition:all 0.2s;
}
.gv-close:hover{background:rgba(232,220,200,0.25)}
.gv-logo{text-align:center;margin-bottom:32px}
.gv-logo span{font-family:'Cormorant Garamond',serif;color:var(--sand);font-size:30px;letter-spacing:7px}
.gv-main{background:rgba(255,255,255,0.1);border-radius:18px;padding:32px 28px;text-align:center;margin-bottom:18px}
.gv-flag{font-size:28px;display:block;margin-bottom:10px}
.gv-text{font-size:26px;line-height:1.9;color:var(--sand-light)}
.gv-jp{background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 20px;text-align:center}
.gv-jp-lbl{font-size:10px;color:rgba(232,220,200,0.4);letter-spacing:3px;margin-bottom:6px;display:block}
.gv-jp-text{font-size:15px;color:rgba(232,220,200,0.65);line-height:1.8}

/* ===== CHAT TAB ===== */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px)}
.chat-lang-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.chat-lang-row .clr-lbl{font-size:11px;color:var(--warm-gray);letter-spacing:1px;margin-right:4px}
.clang-btn{padding:7px 14px;border-radius:16px;border:1px solid var(--sand);background:var(--cream);color:var(--earth-dark);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.clang-btn.active{background:var(--earth-dark);color:var(--sand);border-color:var(--earth-dark)}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--earth);border-radius:2px}
.cmsg{display:flex;gap:10px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cmsg.staff{flex-direction:row-reverse}
.cavatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.cmsg.staff .cavatar{background:var(--earth-dark)}
.cmsg.guest .cavatar{background:var(--sand-light);border:2px solid var(--sand)}
.cbwrap{max-width:76%}
.cmsg.staff .cbwrap{align-items:flex-end;display:flex;flex-direction:column}
.cmsg.guest .cbwrap{align-items:flex-start;display:flex;flex-direction:column}
.cbubble{padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.75}
.cmsg.staff .cbubble{background:var(--earth-dark);color:var(--sand-light);border-radius:14px 14px 4px 14px}
.cmsg.guest .cbubble{background:#fff;color:var(--charcoal);border:1px solid rgba(139,111,71,0.15);border-radius:14px 14px 14px 4px}
.cborig{font-size:11px;opacity:0.55;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.12)}
.cmsg.guest .cborig{border-top-color:rgba(0,0,0,0.07)}
.cbtrans{font-size:13px;margin-top:3px;font-style:italic}
.ctime{font-size:10px;color:var(--warm-gray);margin-top:3px}
.cmsg.staff .ctime{text-align:right}
.chat-input-area{background:#fff;border-top:1px solid var(--sand);padding:12px 14px;flex-shrink:0}
.role-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.role-tog{display:flex;background:var(--sand-light);border-radius:8px;padding:3px;border:1px solid var(--sand)}
.rb{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--warm-gray);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.rb.active{background:var(--earth-dark);color:var(--sand)}
.ci-row{display:flex;gap:8px;align-items:flex-end}
.ci-ta{flex:1;border:1px solid rgba(139,111,71,0.25);border-radius:9px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;background:var(--cream);color:var(--charcoal);max-height:90px;transition:border-color 0.2s;line-height:1.6}
.ci-ta:focus{outline:none;border-color:var(--earth);background:#fff}
.ci-send{background:var(--earth-dark);color:var(--sand);border:none;border-radius:9px;padding:9px 16px;font-size:20px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.ci-send:hover{background:var(--earth-mid);transform:scale(1.05)}

/* Shared */
.btn{border:none;border-radius:9px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13px;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-dark{background:var(--earth-dark);color:var(--sand)}
.btn-dark:hover{background:var(--earth-mid);transform:translateY(-1px)}
.btn-green{background:var(--forest);color:#fff}
.btn-green:hover{background:#3a5233}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:7px}
.btn-ghost{background:var(--sand-light);color:var(--earth-dark);border:1px solid var(--sand)}
.btn-ghost:hover{background:var(--sand)}
.btn-red{background:#fde8e2;color:var(--danger);border:1px solid rgba(184,104,64,0.15)}
.btn-red:hover{background:#f5ccc2}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--earth-dark);color:var(--sand);padding:10px 22px;border-radius:20px;font-size:13px;z-index:2000;opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-ov{position:fixed;inset:0;z-index:1000;background:rgba(30,20,12,0.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal-box{background:var(--cream);border-radius:14px;width:90vw;max-width:540px;padding:26px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.35);transform:translateY(16px);transition:transform 0.25s}
.modal-ov.show .modal-box{transform:translateY(0)}
.modal-ttl{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--earth-dark);margin-bottom:16px}
.modal-act{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

.dots{display:flex;gap:4px;align-items:center}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--warm-gray);animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

@media(max-width:600px){.sp-langs{width:300px}}
</style>
</head>
<body>

<!-- SPLASH: ゲスト言語選択 -->
<div id="splash">
  <div class="sp-logo">
    <span class="ww">WASSA WASSA</span>
    <span class="sub">Staff Communication Tool</span>
  </div>
  <div class="sp-divider"></div>
  <div class="sp-prompt">ゲストの言語を選択</div>
  <div class="sp-langs">
    <button class="sp-btn" onclick="selectLang('en')">
      <span class="flag">🇬🇧</span><span class="lname">English</span><span class="lsub">英語</span>
    </button>
    <button class="sp-btn" onclick="selectLang('zh-TW')">
      <span class="flag">🇹🇼</span><span class="lname">繁體中文</span><span class="lsub">台湾・香港</span>
    </button>
    <button class="sp-btn" onclick="selectLang('zh-CN')">
      <span class="flag">🇨🇳</span><span class="lname">简体中文</span><span class="lsub">中国大陸</span>
    </button>
    <button class="sp-btn" onclick="selectLang('ko')">
      <span class="flag">🇰🇷</span><span class="lname">한국어</span><span class="lsub">韓国語</span>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="hd-left">
      <div class="hd-logo">WASSA WASSA</div>
      <div class="hd-badge">Staff Tool</div>
    </div>
    <div class="hd-right">
      <button class="hd-lang" onclick="document.getElementById('splash').classList.remove('hide')">
        <span class="flag-sm" id="hd-flag">🇬🇧</span>
        <span id="hd-langname">English</span>
        <span style="opacity:0.5;font-size:10px">▼</span>
      </button>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" onclick="showTab('tmpl')" data-tab="tmpl"><span class="ti">📋</span>テンプレート</div>
    <div class="tab-item" onclick="showTab('free')" data-tab="free"><span class="ti">🔤</span>自由翻訳</div>
    <div class="tab-item" onclick="showTab('chat')" data-tab="chat"><span class="ti">💬</span>チャット</div>
  </div>

  <div class="content" id="mainContent">

    <!-- ===== TEMPLATE TAB ===== -->
    <div class="section active" id="sec-tmpl">

      <!-- Category nav -->
      <div class="cat-nav" id="catNav"></div>

      <!-- Add form -->
      <div class="add-form" id="addForm">
        <label class="form-lbl">カテゴリ</label>
        <select class="form-sel" id="newCat">
          <option value="greeting">👋 あいさつ・基本</option>
          <option value="checkin">🗝 チェックイン / チェックアウト</option>
          <option value="facility">🏡 施設案内</option>
          <option value="food">🍽 お食事</option>
          <option value="notice">⚠️ 注意事項</option>
          <option value="other">📌 その他</option>
        </select>
        <label class="form-lbl">日本語テキスト</label>
        <textarea class="form-ta" id="newText" rows="3" placeholder="日本語でフレーズを入力..."></textarea>
        <div class="form-btns">
          <button class="btn btn-green btn-sm" onclick="addTemplate()">✓ 追加</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleAdd()">✕ キャンセル</button>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="btn btn-dark btn-sm" onclick="toggleAdd()">＋ テンプレート追加</button>
      </div>

      <div class="phrase-list" id="phraseList"></div>
    </div>

    <!-- ===== FREE TRANS TAB ===== -->
    <div class="section" id="sec-free">
      <div class="ft-wrap">
        <div class="ft-card">
          <div class="ft-head">
            <span class="fh-icon">✍️</span>
            <div>
              <div class="fh-title">日本語入力 → 翻訳</div>
              <div class="fh-sub">入力後「翻訳」ボタンを押してください</div>
            </div>
          </div>
          <div class="ft-body">
            <div class="ft-textarea-wrap">
              <textarea class="ft-ta" id="ftInput" rows="4"
                placeholder="ここに日本語で入力してください&#10;例：チェックインは16時からになります。"
                oninput="updateCC()"></textarea>
              <span class="ft-cc" id="ftCC">0文字</span>
            </div>
            <div class="ft-btns">
              <button class="btn btn-dark btn-sm" onclick="doFreeTrans()">🌐 翻訳する</button>
              <button class="btn btn-ghost btn-sm" onclick="clearFT()">✕ クリア</button>
            </div>

            <div class="ft-result-area" id="ftResult">
              <div class="ft-result-label">▼ 翻訳結果</div>
              <div class="ft-result-box">
                <div class="ft-result-lang" id="ftResultLang"></div>
                <div class="ft-result-text" id="ftResultText"></div>
                <div class="ft-result-jp" id="ftResultJP"></div>
              </div>
              <button class="show-full-btn" onclick="showGuestView()" style="margin-top:12px">
                📱 大画面でゲストに見せる
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== CHAT TAB ===== */
    <div class="section" id="sec-chat">
      <div class="chat-wrap">
        <div class="chat-lang-row">
          <span class="clr-lbl">ゲスト言語：</span>
          <button class="clang-btn" onclick="switchChatLang('en')" data-cl="en">🇬🇧 EN</button>
          <button class="clang-btn" onclick="switchChatLang('zh-TW')" data-cl="zh-TW">🇹🇼 繁</button>
          <button class="clang-btn" onclick="switchChatLang('zh-CN')" data-cl="zh-CN">🇨🇳 简</button>
          <button class="clang-btn" onclick="switchChatLang('ko')" data-cl="ko">🇰🇷 한</button>
        </div>
        <div class="chat-msgs" id="chatMsgs">
          <div class="cmsg staff">
            <div class="cavatar">👩‍💼</div>
            <div class="cbwrap">
              <div class="cbubble">
                WASSA WASSAへようこそ！なんでもお気軽にどうぞ。
                <div class="cborig">↓ ゲスト言語翻訳</div>
                <div class="cbtrans" id="welcomeTrans"><div class="dots"><span></span><span></span><span></span></div></div>
              </div>
              <div class="ctime" id="welcomeTime"></div>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <div class="role-row">
            <div class="role-tog">
              <button class="rb active" onclick="setRole('staff')" id="rbStaff">👩‍💼 スタッフ（日）</button>
              <button class="rb" onclick="setRole('guest')" id="rbGuest">👤 ゲスト</button>
            </div>
            <button class="btn btn-red btn-sm" onclick="clearChat()">🗑 クリア</button>
          </div>
          <div class="ci-row">
            <textarea class="ci-ta" id="ciInput" rows="1" placeholder="日本語でメッセージを入力..."
              onkeydown="ciKeyDown(event)" oninput="autoResize(this)"></textarea>
            <button class="ci-send" onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- Full screen guest view -->
<div id="guestView">
  <button class="gv-close" onclick="document.getElementById('guestView').style.display='none'">✕ 閉じる</button>
  <div class="gv-logo"><span>WASSA WASSA</span></div>
  <div id="gvContent"></div>
</div>

<!-- Edit modal -->
<div class="modal-ov" id="editModal">
  <div class="modal-box">
    <div class="modal-ttl">✏️ テンプレート編集</div>
    <label class="form-lbl">カテゴリ</label>
    <select class="form-sel" id="editCat">
      <option value="greeting">👋 あいさつ・基本</option>
      <option value="checkin">🗝 チェックイン / チェックアウト</option>
      <option value="facility">🏡 施設案内</option>
      <option value="food">🍽 お食事</option>
      <option value="notice">⚠️ 注意事項</option>
      <option value="other">📌 その他</option>
    </select>
    <label class="form-lbl" style="margin-top:4px">日本語テキスト</label>
    <textarea class="form-ta" id="editText" rows="4"></textarea>
    <div class="modal-act">
      <button class="btn btn-ghost btn-sm" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-green btn-sm" onclick="saveEdit()">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const LANGS={
  'en':    {flag:'🇬🇧',name:'English',   short:'EN'},
  'zh-TW': {flag:'🇹🇼',name:'繁體中文', short:'繁'},
  'zh-CN': {flag:'🇨🇳',name:'简体中文', short:'简'},
  'ko':    {flag:'🇰🇷',name:'한국어',   short:'한'},
};
const CATS={
  greeting:'👋 あいさつ・基本',
  checkin: '🗝 チェックイン / チェックアウト',
  facility:'🏡 施設案内',
  food:    '🍽 お食事',
  notice:  '⚠️ 注意事項',
  other:   '📌 その他',
};

let templates=[
  {id:1,cat:'greeting',text:'WASSA WASSAへようこそ！お越しいただき、ありがとうございます。'},
  {id:2,cat:'greeting',text:'ご不明な点がございましたら、お気軽にお声がけください。'},
  {id:3,cat:'greeting',text:'ごゆっくりおくつろぎください。'},
  {id:4,cat:'checkin', text:'チェックインは16時から、チェックアウトは10時までとなっております。'},
  {id:5,cat:'checkin', text:'早めのチェックインはお受けできません。16時以降にお越しください。'},
  {id:6,cat:'checkin', text:'レイトチェックアウトはお一人様1時間2,200円で承っております。12時までご利用いただけます。'},
  {id:7,cat:'checkin', text:'キャンセルポリシー：7日以上前は無料、3〜6日前は50%、1〜2日前は80%、当日は100%のキャンセル料が発生します。'},
  {id:8,cat:'facility',text:'露天風呂をご利用の際は、必ず水着をご着用ください。'},
  {id:9,cat:'facility',text:'洗濯機・乾燥機は共用でご利用いただけます。'},
  {id:10,cat:'facility',text:'5月〜11月の間、夜にはお庭で45種類のホタルをご覧いただけます。'},
  {id:11,cat:'facility',text:'屋上テラスからエメラルドグリーンの海と満天の星空をお楽しみいただけます。'},
  {id:12,cat:'food',   text:'夕食は屋上テラスにてご提供いたします。お時間になりましたらお声がけします。'},
  {id:13,cat:'food',   text:'食物アレルギーがある場合は、ご到着3日前までにお知らせください。'},
  {id:14,cat:'food',   text:'台風などの悪天候の場合は、室内でのお食事となります。'},
  {id:15,cat:'notice', text:'海でのご遊泳の際は、クラゲ対策にラッシュガードの着用をお勧めします。レンタルもございます。'},
  {id:16,cat:'notice', text:'連泊の場合、お部屋の清掃はございません。何かご入用の場合はお申し付けください。'},
  {id:17,cat:'notice', text:'ビーチパラソルとチェアの貸し出しをしております。1日1,100円（税込）です。'},
  {id:18,cat:'notice', text:'台風時は停電になる場合がございます。あらかじめご了承ください。'},
];

let guestLang='en';
let activeCat='greeting';
let chatRole='staff';
let editingId=null;
let lastFreeJP='', lastFreeTrans='';

// ===== TRANSLATION =====
async function translate(text, toLang){
  if(!text.trim()) return '';
  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ja|${toLang}`;
    const r=await fetch(url);
    const d=await r.json();
    return d.responseStatus===200 ? d.responseData.translatedText : '(翻訳エラー)';
  }catch(e){ return '(ネットワークエラー)' }
}
async function translateFrom(text, fromLang){
  // guest lang → Japanese
  if(!text.trim()) return '';
  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|ja`;
    const r=await fetch(url);
    const d=await r.json();
    return d.responseStatus===200 ? d.responseData.translatedText : '(翻訳エラー)';
  }catch(e){ return '(ネットワークエラー)' }
}

// ===== SPLASH =====
function selectLang(lang){
  guestLang=lang;
  document.getElementById('splash').classList.add('hide');
  document.getElementById('hd-flag').textContent=LANGS[lang].flag;
  document.getElementById('hd-langname').textContent=LANGS[lang].name;
  // update chat lang buttons
  updateChatLangBtns();
  document.getElementById('rbGuest').textContent=`👤 ${LANGS[lang].flag} ゲスト`;
  // translate welcome
  translateWelcome();
  // render templates
  renderCatNav();
  renderPhrases();
}

// ===== TABS =====
function showTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById('mainContent').scrollTop=0;
}

// ===== CAT NAV =====
function renderCatNav(){
  const nav=document.getElementById('catNav');
  nav.innerHTML=Object.entries(CATS).map(([k,v])=>{
    const cnt=templates.filter(t=>t.cat===k).length;
    return`<button class="cat-btn${k===activeCat?' active':''}" onclick="switchCat('${k}')">
      ${v} <span class="cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function switchCat(cat){
  activeCat=cat;
  renderCatNav();
  renderPhrases();
  document.getElementById('mainContent').scrollTop=0;
}

// ===== PHRASES =====
function renderPhrases(){
  const list=document.getElementById('phraseList');
  const items=templates.filter(t=>t.cat===activeCat);
  if(!items.length){
    list.innerHTML='<div style="color:var(--warm-gray);font-size:13px;padding:20px 0;text-align:center">このカテゴリにはまだフレーズがありません</div>';
    return;
  }
  list.innerHTML=items.map(item=>`
    <div class="phrase-card" id="pc-${item.id}">
      <div class="phrase-main" onclick="togglePhrase(${item.id})">
        <div class="phrase-jp">${escHtml(item.text)}</div>
        <div class="phrase-arrow">›</div>
      </div>
      <div class="phrase-result" id="pr-${item.id}">
        <div class="trans-block" id="tb-${item.id}">
          <div class="tb-lang">
            <span>${LANGS[guestLang].flag}</span>
            <span>${LANGS[guestLang].name}</span>
            <button class="tb-copy" onclick="copyTrans(${item.id})">コピー</button>
          </div>
          <div class="tb-text" id="tbt-${item.id}"></div>
        </div>
        <button class="show-full-btn" onclick="showFromTemplate(${item.id})">
          📱 大画面でゲストに見せる
        </button>
      </div>
      <div class="phrase-actions">
        <button class="pa-btn pa-edit" onclick="openEdit(${item.id})">✏️ 編集</button>
        <button class="pa-btn pa-del" onclick="delTemplate(${item.id})">✕ 削除</button>
      </div>
    </div>
  `).join('');
}

async function togglePhrase(id){
  const card=document.getElementById('pc-'+id);
  const wasExpanded=card.classList.contains('expanded');

  // close all
  document.querySelectorAll('.phrase-card.expanded').forEach(c=>{
    c.classList.remove('expanded');
  });

  if(wasExpanded) return; // toggle off

  card.classList.add('expanded');

  // translate if not yet done
  const tbt=document.getElementById('tbt-'+id);
  if(!tbt.dataset.done){
    tbt.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    const item=templates.find(t=>t.id===id);
    const result=await translate(item.text, guestLang);
    tbt.textContent=result;
    tbt.dataset.done='1';
    tbt.dataset.translated=result;
  }
}

function copyTrans(id){
  const el=document.getElementById('tbt-'+id);
  if(!el||!el.dataset.translated) return;
  navigator.clipboard.writeText(el.dataset.translated).then(()=>showToast('コピーしました'));
}

async function showFromTemplate(id){
  const item=templates.find(t=>t.id===id);
  if(!item) return;
  const tbt=document.getElementById('tbt-'+id);
  let transText = tbt&&tbt.dataset.translated ? tbt.dataset.translated : null;
  if(!transText){
    transText = await translate(item.text, guestLang);
    if(tbt){ tbt.textContent=transText; tbt.dataset.done='1'; tbt.dataset.translated=transText; }
  }
  openGuestView(item.text, transText);
}

// ===== ADD TEMPLATE =====
function toggleAdd(){
  document.getElementById('addForm').classList.toggle('show');
  document.getElementById('newText').focus();
}
function addTemplate(){
  const cat=document.getElementById('newCat').value;
  const text=document.getElementById('newText').value.trim();
  if(!text){ showToast('テキストを入力してください'); return; }
  const id=Math.max(...templates.map(t=>t.id),0)+1;
  templates.push({id,cat,text});
  document.getElementById('newText').value='';
  document.getElementById('addForm').classList.remove('show');
  activeCat=cat;
  renderCatNav();
  renderPhrases();
  showToast('✓ 追加しました');
}

// ===== EDIT MODAL =====
function openEdit(id){
  const item=templates.find(t=>t.id===id);
  if(!item) return;
  editingId=id;
  document.getElementById('editCat').value=item.cat;
  document.getElementById('editText').value=item.text;
  document.getElementById('editModal').classList.add('show');
}
function closeEdit(){
  document.getElementById('editModal').classList.remove('show');
  editingId=null;
}
function saveEdit(){
  if(!editingId) return;
  const item=templates.find(t=>t.id===editingId);
  if(item){
    item.cat=document.getElementById('editCat').value;
    item.text=document.getElementById('editText').value.trim();
    // reset translation cache
    const tbt=document.getElementById('tbt-'+editingId);
    if(tbt){ delete tbt.dataset.done; delete tbt.dataset.translated; tbt.textContent=''; }
  }
  activeCat=item.cat;
  closeEdit();
  renderCatNav();
  renderPhrases();
  showToast('✓ 保存しました');
}
function delTemplate(id){
  if(!confirm('削除しますか？')) return;
  templates=templates.filter(t=>t.id!==id);
  renderCatNav();
  renderPhrases();
  showToast('削除しました');
}
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEdit()});

// ===== FREE TRANS =====
function updateCC(){ document.getElementById('ftCC').textContent=document.getElementById('ftInput').value.length+'文字'; }
function clearFT(){ document.getElementById('ftInput').value=''; document.getElementById('ftResult').style.display='none'; updateCC(); }

async function doFreeTrans(){
  const text=document.getElementById('ftInput').value.trim();
  if(!text){ showToast('テキストを入力してください'); return; }
  lastFreeJP=text;

  const resultArea=document.getElementById('ftResult');
  const langEl=document.getElementById('ftResultLang');
  const textEl=document.getElementById('ftResultText');
  const jpEl=document.getElementById('ftResultJP');

  resultArea.style.display='block';
  langEl.innerHTML=`<span>${LANGS[guestLang].flag}</span><span>${LANGS[guestLang].name}</span>`;
  textEl.className='ft-result-text loading';
  textEl.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  jpEl.textContent='';

  const result=await translate(text, guestLang);
  lastFreeTrans=result;
  textEl.className='ft-result-text';
  textEl.textContent=result;
  jpEl.innerHTML=`<span style="font-size:10px;letter-spacing:2px;opacity:0.6">JAPANESE</span><br>${escHtml(text)}`;
}

// ===== GUEST VIEW =====
function openGuestView(jpText, transText){
  document.getElementById('gvContent').innerHTML=`
    <div class="gv-main">
      <span class="gv-flag">${LANGS[guestLang].flag}</span>
      <div class="gv-text">${escHtml(transText)}</div>
    </div>
    <div class="gv-jp">
      <span class="gv-jp-lbl">JAPANESE / 日本語</span>
      <div class="gv-jp-text">${escHtml(jpText)}</div>
    </div>
  `;
  document.getElementById('guestView').style.display='block';
}
function showGuestView(){
  if(!lastFreeTrans){ showToast('先に翻訳してください'); return; }
  openGuestView(lastFreeJP, lastFreeTrans);
}

// ===== CHAT =====
async function translateWelcome(){
  const el=document.getElementById('welcomeTrans');
  el.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const t=await translate('WASSA WASSAへようこそ！なんでもお気軽にどうぞ。', guestLang);
  el.textContent=t;
  document.getElementById('welcomeTime').textContent=getTime();
}

function updateChatLangBtns(){
  document.querySelectorAll('.clang-btn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-cl')===guestLang);
  });
}

function switchChatLang(lang){
  guestLang=lang;
  document.getElementById('hd-flag').textContent=LANGS[lang].flag;
  document.getElementById('hd-langname').textContent=LANGS[lang].name;
  updateChatLangBtns();
  document.getElementById('rbGuest').textContent=`👤 ${LANGS[lang].flag} ゲスト`;
  // reset phrase translation cache
  document.querySelectorAll('[id^="tbt-"]').forEach(el=>{
    delete el.dataset.done; delete el.dataset.translated; el.textContent='';
  });
  document.querySelectorAll('.phrase-card').forEach(c=>c.classList.remove('expanded'));
  renderCatNav();
  renderPhrases();
}

function setRole(role){
  chatRole=role;
  document.getElementById('rbStaff').classList.toggle('active',role==='staff');
  document.getElementById('rbGuest').classList.toggle('active',role==='guest');
  document.getElementById('ciInput').placeholder=
    role==='staff' ? '日本語でメッセージを入力...' : `${LANGS[guestLang].name}でメッセージを入力...`;
}

async function sendChat(){
  const input=document.getElementById('ciInput');
  const text=input.value.trim();
  if(!text) return;
  input.value=''; autoResize(input);

  appendBubble(text, chatRole, true);

  if(chatRole==='staff'){
    const t=await translate(text, guestLang);
    setLastTrans(t, 'staff');
  } else {
    const t=await translateFrom(text, guestLang);
    setLastTrans(`（日本語：${t}）`, 'guest');
  }
}

function appendBubble(text, role, loading){
  const c=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  d.className=`cmsg ${role}`;
  const origLabel= role==='staff' ? '↓ ゲスト言語翻訳' : '↓ 日本語訳';
  d.innerHTML=`
    <div class="cavatar">${role==='staff'?'👩‍💼':'👤'}</div>
    <div class="cbwrap">
      <div class="cbubble">
        ${escHtml(text)}
        <div class="cborig">${origLabel}</div>
        <div class="cbtrans">${loading?'<div class="dots"><span></span><span></span><span></span></div>':''}</div>
      </div>
      <div class="ctime">${getTime()}</div>
    </div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function setLastTrans(text, role){
  const all=document.querySelectorAll(`#chatMsgs .cmsg.${role} .cbtrans`);
  if(all.length) all[all.length-1].textContent=text;
}

function clearChat(){ if(!confirm('履歴をクリアしますか？'))return; document.getElementById('chatMsgs').innerHTML=''; showToast('クリアしました'); }
function ciKeyDown(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()} }

// ===== UTILS =====
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
function getTime(){ return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); }
function escHtml(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
</script>
</body>
</html>
